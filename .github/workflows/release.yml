name: Release
on:
  workflow_dispatch: # Manual trigger
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.repository_owner != 'CleanroomMC' || contains(github.ref_name, 'master')) }}
      - run: ./gradlew build publish --stacktrace -PCleanroomMavenUsername=${{ secrets.MAVEN_NAME }} -PCleanroomMavenPassword=${{ secrets.MAVEN_PASSWORD }}
